packages:
  - "packages/*"
allowBuilds:
  bcrypt: false
# node-red (dev harness) and @types/node-red pull jsonata <2.2.0, which is
# vulnerable to $toMillis resource exhaustion (GHSA-86vw-mfpg-wwv9). Upstream
# node-red 5.0.1 has not yet released a jsonata bump, so force the patched line.
overrides:
  jsonata: ">=2.2.0"
  # axios <1.18.0 (via node-red-admin) has prototype-pollution + DoS advisories.
  axios: "^1.18.0"
  # body-parser <1.20.6 (via express) DoS; kept on the 1.x line for express 4.
  body-parser: "^1.20.6"
